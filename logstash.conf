input {
  beats {
    port => 5044
  }
}
filter {
  # Add metadata for the single target table and mapping.
  mutate {
    add_field => {
      "[@metadata][target_table]" => "Events"
      "[@metadata][ingestion_mapping]" => "%{[@metadata][target_table]}_Mapping"
    }
  }

  # Normalize common fields from different event types.
  # These are best-effort and will not apply to all events.
  # The 'FullEvent' dynamic column in ADX will capture everything.
  mutate {
    rename => {
      "[winlog][event_data][SubjectUserName]" => "[user][name]"
      "[winlog][event_data][User]" => "[user][name]"
      "[winlog][event_data][SubjectDomainName]" => "[user][domain]"
      "[winlog][event_data][NewProcessName]" => "[process][executable]"
      "[winlog][event_data][Image]" => "[process][executable]"
      "[winlog][event_data][CommandLine]" => "[process][command_line]"
      "[winlog][event_data][ParentProcessName]" => "[process][parent][executable]"
      "[winlog][event_data][ParentImage]" => "[process][parent][executable]"
      "[winlog][event_data][IpAddress]" => "[source][ip]"
    }
  }
}
output {
  stdout { codec => rubydebug }
  azure_event_hubs {
    service_namespace => "${EVENTHUB_NAMESPACE}"
    event_hub => "${EVENTHUB_NAME}"
    sas_key_name => "${EVENTHUB_SAS_KEY_NAME}"
    sas_key => "${EVENTHUB_SAS_KEY}"
    properties_bag => {
      "Table" => "%{[@metadata][target_table]}"
      "Format" => "json"
      "IngestionMappingReference" => "%{[@metadata][ingestion_mapping]}"
    }
    codec => "json_lines"
  }
}
