input {
  beats {
    port => 5044
  }
}

filter {
  if [winlog][event_id] == 4624 {
    grok {
      match => { "message" => "(?s).*An account was successfully logged on..*Subject:.*Account Name:\s*%{DATA:winlog.subject_user_name}.*Account Domain:\s*%{DATA:winlog.subject_user_domain}.*Logon Information:.*Logon Type:\s*%{NUMBER:winlog.logon_type}.*Network Information:.*Source Network Address:\s*%{IP:winlog.source_ip}.*Source Port:\s*%{NUMBER:winlog.source_port}" }
      overwrite => [ "message" ]
    }
    mutate {
      rename => {
        "winlog.subject_user_name" => "[user][name]"
        "winlog.subject_user_domain" => "[user][domain]"
      }
      add_field => {
        "[@metadata][target_table]" => "WindowsLogonEvents"
        "[@metadata][ingestion_mapping]" => "WindowsLogonEvents_Mapping"
      }
    }
    geoip {
      source => "winlog.source_ip"
      target => "source.geo"
    }
  } else if [winlog][event_id] == 4688 {
    grok {
      match => { "message" => "(?s).*A new process has been created..*Creator Subject:.*Account Name:\s*%{DATA:winlog.user_name}.*Account Domain:\s*%{DATA:winlog.user_domain}.*Process Information:.*New Process Name:\s*%{GREEDYDATA:winlog.process_executable}.*Command Line:\s*%{GREEDYDATA:winlog.process_command_line}.*Parent Process Information:.*Parent Process Name:\s*%{GREEDYDATA:winlog.parent_process_executable}" }
      overwrite => [ "message" ]
    }
    mutate {
      rename => {
        "winlog.user_name" => "[user][name]"
        "winlog.user_domain" => "[user][domain]"
        "winlog.process_executable" => "[process][executable]"
        "winlog.process_command_line" => "[process][command_line]"
        "winlog.parent_process_executable" => "[process][parent][executable]"
      }
      add_field => {
        "[@metadata][target_table]" => "WindowsProcessEvents"
        "[@metadata][ingestion_mapping]" => "WindowsProcessEvents_Mapping"
      }
    }
  }
}

output {
  azure_event_hubs {
    service_namespace => "${EVENTHUB_NAMESPACE}"
    event_hub => "${EVENTHUB_NAME}"
    sas_key_name => "${EVENTHUB_SAS_KEY_NAME}"
    sas_key => "${EVENTHUB_SAS_KEY}"
    properties_bag => {
      "Table" => "%{[@metadata][target_table]}"
      "Format" => "json"
      "IngestionMappingReference" => "%{[@metadata][ingestion_mapping]}"
    }
    codec => "json_lines"
  }
}
